stages:
  - build
  - release

variables:
  BUILD_DIR: build

build-linux:
  stage: build
  image: ubuntu:22.04
  before_script:
    - echo "deb http://mirror.arvancloud.ir/ubuntu/ jammy main universe" > /etc/apt/sources.list
    - echo "deb http://mirror.arvancloud.ir/ubuntu/ jammy-updates main universe" >> /etc/apt/sources.list
    - echo "deb http://mirror.arvancloud.ir/ubuntu/ jammy-security main universe" >> /etc/apt/sources.list
    
    - apt-get update
    - apt-get install -y build-essential cmake libboost-system-dev libssl-dev

  script:
    - cmake -B $BUILD_DIR -DCMAKE_BUILD_TYPE=Release
    - cmake --build $BUILD_DIR
  artifacts:
    paths:
      - build/muld
    expire_in: 1 week

release:
  stage: release
  image: ubuntu:22.04
  needs: [build-linux]
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    # Use the same accessible mirrors you used in the build stage
    - echo "deb http://mirror.arvancloud.ir/ubuntu/ jammy main universe" > /etc/apt/sources.list
    - echo "deb http://mirror.arvancloud.ir/ubuntu/ jammy-updates main universe" >> /etc/apt/sources.list
    - echo "deb http://mirror.arvancloud.ir/ubuntu/ jammy-security main universe" >> /etc/apt/sources.list
    - apt-get update
    - apt-get install -y curl ca-certificates
  script:
    - echo "Creating release for $CI_COMMIT_TAG via GitLab API"
    - |
      curl --fail --request POST \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"Release $CI_COMMIT_TAG\",
          \"tag_name\": \"$CI_COMMIT_TAG\",
          \"description\": \"Release $CI_COMMIT_TAG\",
          \"assets\": {
            \"links\": [
              {
                \"name\": \"muld-linux-amd64\",
                \"url\": \"${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/build/muld?job=build-linux\"
              }
            ]
          }
        }" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
